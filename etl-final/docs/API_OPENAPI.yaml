openapi: 3.0.3
info:
  title: ETL Pipeline APIs
  version: "1.0"
  description: |
    API surface for the ETL microservices. This reflects the currently implemented endpoints.
servers:
  - url: http://localhost:{port}
    variables:
      port:
        default: "8001"
        description: Service port (varies by service)

tags:
  - name: connector
  - name: extractor
  - name: detector
  - name: transformer
  - name: loader
  - name: metadata

paths:
  /upload/:
    post:
      tags: [connector]
      summary: Upload a file for ingestion
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Uploaded
        "400":
          description: Validation error

  /connect-db/:
    post:
      tags: [connector]
      summary: Validate DB connection and send to Kafka
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [db_type, host, user, password, database, port]
              properties:
                db_type:
                  type: string
                  enum: [mysql, postgres]
                host:
                  type: string
                user:
                  type: string
                password:
                  type: string
                database:
                  type: string
                port:
                  type: integer
      responses:
        "200":
          description: Connected
        "400":
          description: Validation error

  /health/:
    get:
      tags: [connector, extractor, detector, transformer, metadata]
      summary: Health check
      responses:
        "200":
          description: OK

  /metrics/:
    get:
      tags: [connector, extractor, detector, transformer, metadata]
      summary: Prometheus metrics
      responses:
        "200":
          description: Metrics text format

  /run/:
    post:
      tags: [extractor]
      summary: Manual extractor trigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                schema:
                  type: object
      responses:
        "200":
          description: Extraction completed
        "400":
          description: Error

  /progress/:
    get:
      tags: [extractor]
      summary: Extraction progress or active extractions
      parameters:
        - in: query
          name: active
          schema:
            type: string
          description: Set to "true" to list active extractions
      responses:
        "200":
          description: Progress
        "400":
          description: Error

  /progress/{extraction_id}/:
    get:
      tags: [extractor]
      summary: Progress for a specific extraction
      parameters:
        - in: path
          name: extraction_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Progress
        "404":
          description: Not found

  /run-detector/:
    get:
      tags: [detector]
      summary: Manual schema detection trigger
      responses:
        "200":
          description: Schema extracted
        "400":
          description: Error

  /test/:
    post:
      tags: [transformer]
      summary: Manual transformation test
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                batch_id:
                  type: string
                row:
                  type: object
                schema_contract:
                  type: object
      responses:
        "200":
          description: Transformed

  /quarantine/:
    get:
      tags: [transformer]
      summary: List quarantined rows
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: offset
          schema:
            type: integer
        - in: query
          name: source_id
          schema:
            type: string
        - in: query
          name: batch_id
          schema:
            type: string
        - in: query
          name: include_reprocessed
          schema:
            type: string
      responses:
        "200":
          description: Quarantine rows

  /quarantine/reprocess/:
    post:
      tags: [transformer]
      summary: Reprocess quarantined rows
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                rules_path:
                  type: string
                schema_contract:
                  type: object
      responses:
        "200":
          description: Reprocessed

  /test/:
    post:
      tags: [loader]
      summary: Manual loader test
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  type: object
                table:
                  type: string
                row:
                  type: object
      responses:
        "200":
          description: Row inserted

  /logs/connections/:
    get:
      tags: [metadata]
      summary: Connection logs
      responses:
        "200":
          description: Logs

  /logs/schema/:
    get:
      tags: [metadata]
      summary: Schema logs
      responses:
        "200":
          description: Logs

  /logs/extract/:
    get:
      tags: [metadata]
      summary: Extraction logs
      responses:
        "200":
          description: Logs

  /logs/transform/:
    get:
      tags: [metadata]
      summary: Transform logs
      responses:
        "200":
          description: Logs

  /logs/load/:
    get:
      tags: [metadata]
      summary: Load logs
      responses:
        "200":
          description: Logs

  /lineage/{row_id}/:
    get:
      tags: [metadata]
      summary: Lineage query
      parameters:
        - in: path
          name: row_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lineage graph

  /quality/trends/:
    get:
      tags: [metadata]
      summary: Quality trends
      responses:
        "200":
          description: Quality trend series
