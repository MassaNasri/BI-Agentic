apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-config
  namespace: etl
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  CLICKHOUSE_HOST: "clickhouse"
  CLICKHOUSE_PORT: "9000"
  CLICKHOUSE_DATABASE: "etl"
  KAFKA_CONSUMER_PARALLELISM: "2"
  KAFKA_REBALANCE_STRATEGY: "cooperative"
  EXTRACTOR_BATCH_SIZE: "500"
  TRANSFORMER_BATCH_SIZE: "500"
  TRANSFORMER_OUTPUT_BATCH_SIZE: "500"
  LOADER_BATCH_SIZE: "1000"
  LOADER_TRANSACTIONAL_LOAD: "true"
  LOADER_RETRIES: "3"
  LOADER_BACKOFF_BASE: "0.5"
  LOADER_MAX_BACKOFF: "5.0"
  LOADER_MAX_BUFFER_ROWS: "20000"
  LOADER_MAX_BUFFER_ROWS_PER_TABLE: "10000"
  DB_POOL_ENABLED: "true"
  DB_POOL_MIN: "1"
  DB_POOL_MAX: "5"
  STATELESS_MODE: "true"
