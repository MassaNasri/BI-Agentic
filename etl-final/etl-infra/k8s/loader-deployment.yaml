apiVersion: apps/v1
kind: Deployment
metadata:
  name: loader-service
  namespace: etl
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loader-service
  template:
    metadata:
      labels:
        app: loader-service
    spec:
      containers:
        - name: loader-service
          image: etl-final/loader-service:latest
          ports:
            - containerPort: 8005
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: etl-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 20
